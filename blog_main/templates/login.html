{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <!-- Login Heading Outside the Box -->
            <h2 class="text-center text-dark fw-bold mb-3">
                Login
            </h2>

            <div class="card shadow">
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}

                        {{ form|crispy }}

                        <div class="text-center mt-3">
                            <button type="submit" class="btn btn-warning px-4">
                                Login
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
