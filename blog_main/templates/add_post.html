{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3 dashboard-sidebar">

            <div class="list-group">

                <a href="{% url 'dashboard' %}" class="list-group-item">
                    Dashboard
                </a>

                <a href="{% url 'categories' %}" class="list-group-item">
                    Categories
                </a>

                <a href="{% url 'posts' %}" class="list-group-item active">
                    Posts
                </a>

                <a href="{% url 'logout' %}" class="list-group-item text-danger">
                    Logout
                </a>

            </div>

        </div>

        <!-- Main Content -->
        <div class="col-md-9">

            <div class="card">

                <div class="card-header">
                    <h3>Add New Post</h3>
                </div>

                <div class="card-body">

                    <form method="POST" enctype="multipart/form-data">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <button type="submit" class="btn btn-warning">
                            Save Post
                        </button>

                        <a href="{% url 'posts' %}" class="btn btn-secondary">
                            Cancel
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
