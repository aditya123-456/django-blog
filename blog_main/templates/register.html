{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <h1 class="text-center font-weight-bold mb-5">
                Register
            </h1>

            <form method="POST">
                {% csrf_token %}

                {{ form|crispy }}

                <div class="text-left mt-4">
                    <button type="submit" class="btn btn-warning px-4">
                        Submit
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
