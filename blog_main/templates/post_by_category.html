{% extends 'base.html'%}


  {% block content %}


<!-- featured posts -->
    <!-- Blog Cards -->
     <h3 class="text-uppercase text-warning" style="letter-spacing: 2px;">category-{{category}}</h3>
    <div class="row mb-2">
      {% for post in posts %}

<div class="card mb-4 shadow-sm">
    <div class="row no-gutters">

        <div class="col-md-4">
            <img src="{{ post.featured_image.url }}"
                 class="img-fluid h-100 w-100"
                 style="object-fit: cover;"
                 alt="{{ post.title }}">
        </div>

        <div class="col-md-8">
           <div class="card-body">

    <span class="badge badge-warning">
        {{ post.category }}
    </span>

    <h3>
        <a href="{% url 'blogs' post.slug %}">
            {{ post.title }}
        </a>
    </h3>

    <small class="text-muted">
        {{ post.created_at|timesince }} ago | {{ post.author }}
    </small>

    <p class="mt-2">
        {{ post.short_description }}
    </p>

    <a href="{% url 'blogs' post.slug %}" class="btn btn-warning btn-sm">
        Read More
    </a>

</div>
        </div>

    </div>
</div>

{% empty %}

<p class="text-center">No posts found.</p>

{% endfor %}



</div>

{% endblock %}
