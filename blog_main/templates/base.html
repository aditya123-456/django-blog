{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Django Blog</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700,900"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/blog.css' %}">

</head>

<body>

<div class="container">

    <!-- Header -->
    <header class="blog-header py-3 border-bottom">

        <div class="row align-items-center">

            <!-- Logo -->
            <div class="col-md-3">
                <a href="{% url 'home' %}"
                   class="blog-header-logo text-dark"
                   style="text-decoration:none;">
                    <h2>Django Blog</h2>
                </a>
            </div>

            <!-- Search -->
            <div class="col-md-6">

                <form action="{% url 'search' %}" method="GET">

                    <div class="input-group">

                        <input
                            type="text"
                            name="keyword"
                            class="form-control"
                            placeholder="Enter search term...">

                        <div class="input-group-append">

                            <button class="btn btn-warning" type="submit">
                                Go!
                            </button>

                        </div>

                    </div>

                </form>

            </div>

            <!-- Right Buttons -->
            <div class="col-md-3 text-right">

                {% if user.is_authenticated %}

                    <a href="{% url 'dashboard' %}"
                       class="btn btn-info">
                        Dashboard
                    </a>

                    <a href="{% url 'logout' %}"
                       class="btn btn-outline-secondary">
                        Logout
                    </a>

                {% else %}

                    <a href="{% url 'login' %}"
                       class="btn btn-warning">
                        Sign In
                    </a>

                    <a href="{% url 'register' %}"
                       class="btn btn-outline-secondary">
                        Register
                    </a>

                {% endif %}

            </div>

        </div>

    </header>

    <!-- Categories -->
    <div class="nav-scroller py-2 mb-4 border-bottom">

        <nav class="nav d-flex justify-content-between">

            {% for cat in categories %}

                <a class="p-2 text-muted"
                   href="{% url 'post_by_category' cat.id %}">
                    {{ cat.category_name }}
                </a>

            {% endfor %}

        </nav>

    </div>

    <!-- Main Content -->
    {% block content %}
    {% endblock %}

</div>

<!-- Footer -->
<footer class="blog-footer mt-5">
    <div class="container text-center">
        <p class="mb-0">
            Django blog built with ❤️ by
            <a href="#">Aditya Narayan</a>
        </p>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
