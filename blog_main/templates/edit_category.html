{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3 dashboard-sidebar">

            <div class="list-group">

                <a href="{% url 'dashboard' %}" class="list-group-item">
                    Dashboard
                </a>

                <a href="{% url 'categories' %}" class="list-group-item active">
                    Categories
                </a>

                <a href="#" class="list-group-item">
                    Blogs
                </a>

                <a href="{% url 'logout' %}" class="list-group-item text-danger">
                    Logout
                </a>

            </div>

        </div>

        <!-- Main Content -->
        <div class="col-md-9">

            <div class="card">

                <div class="card-header">
                    <h3>Delete Category</h3>
                </div>

                <div class="card-body">

                    <h5>
                        Are you sure you want to delete
                        <strong>{{ category.category_name }}</strong>?
                    </h5>

                    <form method="POST">

                        {% csrf_token %}

                        <button type="submit" class="btn btn-danger">
                            Yes, Delete
                        </button>

                        <a href="{% url 'categories' %}" class="btn btn-secondary">
                            Cancel
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
