<form method="POST">

    {% csrf_token %}

    <div class="form-group">
        <label for="category_name">Category Name</label>

        <input
            type="text"
            id="category_name"
            name="category_name"
            class="form-control"
            placeholder="Enter category name"
            required>
    </div>

    <div class="form-group mt-3">
    <button type="submit" class="btn btn-warning px-4">
        Submit
    </button>

    <a href="{% url 'categories' %}" class="btn btn-warning px-4 ml-2">
        Cancel
    </a>
</div>

    </div>

</form>
