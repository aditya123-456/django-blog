{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h3>
        Search Results for "{{ keyword }}"
    </h3>

    <hr>

    {% if posts %}

        {% for post in posts %}

        <div class="card mb-4">

            <div class="card-body">

                <h3>
                    <a href="{% url 'blogs' post.slug %}">
                        {{ post.title }}
                    </a>
                </h3>

                <p>
                    {{ post.short_description }}
                </p>

                <p>
                    {{ post.blog_body|truncatewords:40 }}
                </p>

                <a href="{% url 'blogs' post.slug %}" class="btn btn-warning">
                    Read More
                </a>

            </div>

        </div>

        {% endfor %}

    {% else %}

        <div class="alert alert-danger">
            No results found.
        </div>

    {% endif %}

</div>

{% endblock %}
