{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3 dashboard-sidebar">

            <div class="list-group">

                <a href="{% url 'dashboard' %}" class="list-group-item">
                    Dashboard
                </a>

                <a href="{% url 'categories' %}" class="list-group-item">
                    Categories
                </a>

                <a href="{% url 'posts' %}" class="list-group-item active">
                    Posts
                </a>

                <a href="{% url 'logout' %}" class="list-group-item text-danger">
                    Logout
                </a>

            </div>

        </div>

        <!-- Main Content -->
        <div class="col-md-9">

            <div class="card border-danger">

                <div class="card-header bg-danger text-white">
                    <h3 class="mb-0">Delete Post</h3>
                </div>

                <div class="card-body">

                    <h5>
                        Are you sure you want to delete this post?
                    </h5>

                    <p class="mt-3">
                        <strong>{{ post.title }}</strong>
                    </p>

                    {% if post.featured_image %}
                        <img src="{{ post.featured_image.url }}"
                             width="200"
                             class="img-thumbnail mb-3">
                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <button type="submit" class="btn btn-danger">
                            Yes, Delete
                        </button>

                        <a href="{% url 'posts' %}" class="btn btn-secondary">
                            Cancel
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
